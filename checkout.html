<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — WebCraft</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --black:#0A0A0B;
  --white:#FAFAF8;
  --gold:#C9A84C;
  --muted:#6C6C70;
  --charcoal:#1C1C1E;
  --border:rgba(201,168,76,0.2);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--black);
  color:var(--white);
}

/* layout */
.container{
  max-width:900px;
  margin:auto;
  padding:6rem 2rem;
}

h1{
  font-family:'Syne',sans-serif;
  font-size:3rem;
  margin-bottom:1rem;
}

p{color:var(--muted);margin-bottom:2rem}

/* card */
.card{
  background:var(--charcoal);
  border:1px solid var(--border);
  border-radius:20px;
  padding:2rem;
}

/* form */
.form-group{
  margin-bottom:1.5rem;
}

label{
  display:block;
  font-size:0.85rem;
  margin-bottom:0.5rem;
  color:var(--muted);
}

input, textarea, select{
  width:100%;
  padding:0.8rem;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:#111;
  color:var(--white);
  font-size:0.9rem;
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--gold);
}

/* button */
button{
  width:100%;
  padding:1rem;
  background:var(--gold);
  color:black;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#F0D07A;
}

/* plan box */
.plan-box{
  margin-bottom:2rem;
  padding:1rem;
  border:1px solid var(--border);
  border-radius:10px;
  background:rgba(201,168,76,0.05);
}

.back-arrow{
  position:fixed;
  top:20px;
  left:20px;
  text-decoration:none;
  color:var(--white);
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  padding:0.5rem 1rem;
  border-radius:30px;
  font-size:0.85rem;
  transition:0.2s;
  backdrop-filter:blur(10px);
}

.back-arrow:hover{
  border-color:var(--gold);
  color:var(--gold);
}
</style>
</head>

<body>
<a href="javascript:history.back()" class="back-arrow">← Volver</a>

<div class="container">

<h1>Finalizar compra</h1>
<p>Completa los datos y empezamos con tu web inmediatamente.</p>

<div class="card">

<div class="plan-box">
  <strong id="planName"></strong>
</div>

<form action="https://formspree.io/f/xojrvvej" method="POST">

<input type="hidden" name="plan" id="planInput">

<div class="form-group">
<label>Nombre</label>
<input type="text" name="nombre" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Nombre del negocio</label>
<input type="text" name="negocio">
</div>

<div class="form-group">
<label>Describe tu proyecto</label>
<textarea name="mensaje" rows="4"></textarea>
</div>

<div class="form-group">
<label>Plan Seleccionado</label>
<select name="extras">
<option value="">Click Para Seleccionar</option>
<option>Beginner 5$</option>
<option>Growth 10$</option>
<option>Pro Studio 30$</option>
<option>Elite Scale 50$</option>
<option>Empire 90$</option>
</select>
</div>

<button type="submit">Confirmar pedido</button>
</form>

</div>
</div>



<script>
// coger plan de la URL
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan") || "Se te contactará todo por el Email, donde te enviaremos una Plantilla de cómo vamos a funcionar y algunas dudas para hacer de tu Página Web a la perfección lo que tu quieres. Allí se te dirá a que dirección tienes que pagar.";

document.getElementById("planName").textContent = plan;
document.getElementById("planInput").value = plan;
</script>

</body>
</html>
