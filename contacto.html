<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto — WebCraft</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

.back-arrow{
  position:fixed;
  top:20px;
  left:20px;
  text-decoration:none;
  color:var(--white);
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  padding:0.5rem 1rem;
  border-radius:30px;
  font-size:0.85rem;
  transition:0.2s;
  backdrop-filter:blur(10px);
}

.back-arrow:hover{
  border-color:var(--gold);
  color:var(--gold);
}

:root {
  --black:#0A0A0B;
  --white:#FAFAF8;
  --gold:#C9A84C;
  --muted:#6C6C70;
  --charcoal:#1C1C1E;
  --border:rgba(201,168,76,0.2);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--black);
  color:var(--white);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:6rem 2rem;
}

h1{
  font-family:'Syne',sans-serif;
  font-size:3rem;
  margin-bottom:1rem;
}

p{
  color:var(--muted);
  margin-bottom:3rem;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
}

/* cards */
.card{
  background:var(--charcoal);
  border:1px solid var(--border);
  border-radius:20px;
  padding:2rem;
}

/* contact items */
.contact-item{
  margin-bottom:1.5rem;
}

.contact-item strong{
  display:block;
  margin-bottom:0.3rem;
}

/* form */
.form-group{
  margin-bottom:1.2rem;
}

label{
  display:block;
  font-size:0.8rem;
  margin-bottom:0.4rem;
  color:var(--muted);
}

input, textarea{
  width:100%;
  padding:0.8rem;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:#111;
  color:white;
}

input:focus, textarea:focus{
  outline:none;
  border-color:var(--gold);
}

/* button */
button{
  width:100%;
  padding:1rem;
  background:var(--gold);
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#F0D07A;
}

/* responsive */
@media(max-width:800px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<a href="javascript:history.back()" class="back-arrow">← Volver</a>
<div class="container">

<h1>Contacto</h1>
<p>¿Tienes dudas o quieres empezar ya? Escríbenos o contáctanos directamente por cualquier canal.</p>

<div class="grid">

<!-- INFO CONTACTO -->
<div class="card">

<div class="contact-item">
<strong>Email</strong>
<span>espumitastudio@gmail.com</span>
</div>

<div class="contact-item">
<strong>Discord</strong>
<span>yaikov_</span>
</div>

<div class="contact-item">
<strong>Email de Patrocinio</strong>
<span>espumitastudio@gmail.com</span>
</div>

<div class="contact-item">
<strong>Ubicación</strong>
<span>📍España</span>
</div>

</div>

<!-- FORMULARIO -->
<div class="card">

<form action="https://formspree.io/f/mwvypplb" method="POST">

<div class="form-group">
<label>Nombre</label>
<input type="text" name="nombre" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Tipo de consulta</label>
<input type="text" name="tipo" placeholder="Ej: presupuesto, duda, soporte...">
</div>

<div class="form-group">
<label>Mensaje</label>
<textarea name="mensaje" rows="4" required></textarea>
</div>

<button type="submit">Enviar mensaje</button>

</form>

</div>

</div>
</div>

</body>
</html>
